<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 Anos - Kamilla Souza</title>
    <!-- Fontes Elegantes do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0b0713 0%, #150d22 50%, #05030a 100%);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Brilhos Flutuantes de Fundo */
        .particle {
            position: absolute;
            pointer-events: none;
            background: radial-gradient(circle, rgba(212,175,255,0.6) 0%, rgba(138,43,226,0) 70%);
            border-radius: 50%;
            animation: floatUp 8s infinite linear;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) translateX(0) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(50px) scale(1.2); opacity: 0; }
        }

        /* Container Principal */
        .card {
            max-width: 460px;
            width: 100%;
            background: rgba(27, 18, 41, 0.45);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(155, 93, 229, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 255, 0.15);
        }
        
        /* PLAYER DE MÚSICA */
        .audio-container {
            background: rgba(43, 29, 65, 0.4);
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(212, 175, 255, 0.1);
        }
        .audio-player {
            background: linear-gradient(135deg, rgba(155, 93, 229, 0.3) 0%, rgba(212, 175, 255, 0.1) 100%);
            padding: 10px 24px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(155, 93, 229, 0.2);
        }
        .audio-player:hover { 
            background: linear-gradient(135deg, rgba(155, 93, 229, 0.5) 0%, rgba(212, 175, 255, 0.2) 100%);
            transform: scale(1.04);
        }
        .play-icon { width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 11px solid #fff; }
        .pause-icon { width: 9px; height: 11px; border-left: 3px solid #fff; border-right: 3px solid #fff; display: none; }
        .playing .play-icon { display: none; }
        .playing .pause-icon { display: block; }
        .audio-player span { font-size: 11px; font-weight: 600; letter-spacing: 1px; color: #f3e8ff; }

        /* CARROSSEL DE IMAGENS E NAVEGAÇÃO */
        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-bottom: 1px solid rgba(212, 175, 255, 0.05);
        }
        .carousel-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }
        .carousel-item {
            min-width: 100%;
            box-sizing: border-box;
            position: relative;
        }
        .carousel-item img {
            width: 100%;
            display: block;
        }

        /* SETAS DO CARROSSEL */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(27, 18, 41, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(212, 175, 255, 0.3);
            color: #d4afff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            user-select: none;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .nav-btn:hover {
            background: rgba(155, 93, 229, 0.5);
            color: #fff;
            scale: 1.1;
        }
        .nav-btn.prev { left: 12px; }
        .nav-btn.next { right: 12px; }
        .nav-btn.hidden { opacity: 0; pointer-events: none; }
        
        map area { cursor: pointer; }

        /* BOLINHAS INDICADORAS */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 16px 0 8px 0;
        }
        .dot {
            width: 7px;
            height: 7px;
            background: rgba(212, 175, 255, 0.25);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .dot.active { 
            background: #d4afff; 
            width: 22px; 
            border-radius: 10px;
            box-shadow: 0 0 8px #9b5de5;
        }

        /* CONTEÚDO INFERIOR */
        .content {
            padding: 15px 28px 28px 28px;
            text-align: center;
        }
        h1.title { 
            font-family: 'Cinzel', serif;
            font-size: 26px; 
            margin-bottom: 20px; 
            color: #e4cdff; 
            font-weight: 400; 
            letter-spacing: 3px;
        }
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.02);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 255, 0.08);
        }
        .info-box p { font-size: 10px; color: #c3b4fc; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; letter-spacing: 1px; }
        .info-box h3 { font-size: 14px; color: #fff; font-weight: 400; }
        
        .address-box {
            background: rgba(255, 255, 255, 0.02);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(212, 175, 255, 0.08);
        }
        .address-box p { font-size: 10px; color: #c3b4fc; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; letter-spacing: 1px; }
        .address-box h3 { font-size: 13px; color: #fff; font-weight: 400; line-height: 1.5; }

        /* BOTOES ADICIONADOS COM DESIGN PREMIUM */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 12px;
            cursor: pointer;
            border: none;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .btn-maps { 
            background: transparent; 
            color: #d4afff; 
            border: 1px solid rgba(212, 175, 255, 0.4);
        }
        .btn-maps:hover { 
            background: rgba(212, 175, 255, 0.1); 
            transform: translateY(-2px); 
        }

        .btn-gift { 
            background: rgba(255, 255, 255, 0.05); 
            color: #e4cdff; 
            border: 1px solid rgba(212, 175, 255, 0.15);
        }
        .btn-gift:hover { 
            background: rgba(212, 175, 255, 0.15); 
            transform: translateY(-2px); 
        }
        
        .btn-wpp { 
            background: linear-gradient(135deg, #7b2cbf 0%, #9d4edd 100%); 
            color: white; 
            margin-bottom: 0;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3);
        }
        .btn-wpp:hover { 
            background: linear-gradient(135deg, #9d4edd 0%, #c77dff 100%); 
            transform: translateY(-2px); 
            box-shadow: 0 6px 22px rgba(157, 78, 221, 0.5);
        }

        .hint { font-size: 11px; color: #8c829e; margin-top: 18px; display: block; font-style: italic; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/imageMapResizer.min.js"></script>
</head>
<body>

    <div id="particle-container"></div>

    <div class="card">
        <!-- Música -->
        <div class="audio-container">
            <div class="audio-player" id="playerBtn">
                <div class="play-icon"></div>
                <div class="pause-icon"></div>
                <span id="statusText">PLAY NA TRILHA DA NOITE 🎵</span>
            </div>
        </div>

        <!-- Carrossel de Imagens -->
        <div class="carousel-container">
            <!-- Setas Laterais de Navegação -->
            <div class="nav-btn prev hidden" id="prevBtn" onclick="navigateSlide(-1)">&#10094;</div>
            <div class="nav-btn next" id="nextBtn" onclick="navigateSlide(1)">&#10095;</div>

            <div class="carousel-track" id="track">
                <!-- SLIDE 0 -->
                <div class="carousel-item">
                    <img src="final.jpg" usemap="#image-map" alt="Convite Principal">
                    <map name="image-map">
                        <area target="_blank" alt="Localização" title="Localização" href="https://www.google.com/maps/search/?api=1&query=Top+Festas+Casa+de+Eventos+R+Conego+Jose+Monteiro+de+Noronha+1175" coords="902,346,994,448" shape="rect">
                        <area target="_blank" alt="Confirmar Presença" title="Confirmar Presença" href="https://wa.me/5592988232669?text=Ol%C3%A1!%20Confirmo%20minha%20presen%C3%A7a%20nos%2015%20anos%20da%20Kamilla!" coords="902,570,994,670" shape="rect">
                        <area alt="Sugestão de Presente" title="Sugestão de Presente" href="javascript:void(0);" onclick="moveToSlide(2)" coords="880,854,1032,1001" shape="rect">
                    </map>
                </div>
                
                <!-- Demais slides reais -->
                <div class="carousel-item"><img src="dress cod.jpeg" alt="Traje"></div>
                <div class="carousel-item"><img src="presente.jpeg" alt="Sugestões de Presente"></div>
                <!-- Alterado para evitar acentos -->
                <div class="carousel-item"><img src="endereco.jpeg" alt="Localização"></div>
            </div>
        </div>

        <!-- Indicadores -->
        <div class="carousel-dots">
            <div class="dot active" onclick="moveToSlide(0)"></div>
            <div class="dot" onclick="moveToSlide(1)"></div>
            <div class="dot" onclick="moveToSlide(2)"></div>
            <div class="dot" onclick="moveToSlide(3)"></div>
        </div>

        <!-- Informações Finais e Botões -->
        <div class="content">
            <h1 class="title">Kamilla Souza</h1>
            
            <div class="details-grid">
                <div class="info-box">
                    <p>📅 Data</p>
                    <h3>Sáb, 29 de Agosto</h3>
                </div>
                <div class="info-box">
                    <p>🕒 Horário</p>
                    <h3>Às 18:30h</h3>
                </div>
            </div>

            <div class="address-box">
                <p>📍 Local do Evento</p>
                <h3><strong>Top Festas Casa de Eventos</strong><br>R. Cônego José Monteiro de Noronha, 1175</h3>
            </div>

            <!-- BOTÕES ESTILIZADOS -->
            <a href="https://www.google.com/maps/search/?api=1&query=Top+Festas+Casa+de+Eventos+R+Conego+Jose+Monteiro+de+Noronha+1175" target="_blank" class="btn btn-maps">
                📍 VER ROTAS NO MAPA
            </a>

            <button onclick="moveToSlide(2)" class="btn btn-gift">
                🎁 SUGESTÃO DE PRESENTES
            </button>

            <a href="https://wa.me/5592988232669?text=Ol%C3%A1!%20Confirmo%20minha%20presen%C3%A7a%20nos%2015%20anos%20da%20Kamilla!" target="_blank" class="btn btn-wpp">
                ✨ CONFIRMAR PRESENÇA
            </a>
            
            <span class="hint">Deslize para ver os detalhes em tela cheia 💜</span>
        </div>
    </div>

    <!-- Múltiplos formatos e variações de maiúsculas para blindar no GitHub -->
    <audio id="bgMusic" loop preload="auto" style="display:none;">
        <source src="musica.mpeg" type="audio/mpeg">
        <source src="musica.mp3" type="audio/mp3">
        <source src="Musica.mpeg" type="audio/mpeg">
        <source src="Musica.mp3" type="audio/mp3">
    </audio>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            imageMapResize();
        });

        const container = document.getElementById('particle-container');
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.width = `${Math.random() * 12 + 4}px`;
            particle.style.height = particle.style.width;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.animationDelay = `${Math.random() * 8}s`;
            particle.style.animationDuration = `${Math.random() * 6 + 6}s`;
            container.appendChild(particle);
        }

        const track = document.getElementById('track');
        const dots = document.querySelectorAll('.dot');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const totalSlides = document.querySelectorAll('.carousel-item').length;
        let currentIndex = 0;
        let startX = 0;
        let isDragging = false;

        function updateArrowVisibility() {
            if (currentIndex === 0) prevBtn.classList.add('hidden');
            else prevBtn.classList.remove('hidden');

            if (currentIndex === totalSlides - 1) nextBtn.classList.add('hidden');
            else nextBtn.classList.remove('hidden');
        }

        function moveToSlide(index) {
            currentIndex = index;
            track.style.transform = `translateX(-${index * 100}%)`;
            dots.forEach(dot => dot.classList.remove('active'));
            if (dots[index]) dots[index].classList.add('active');
            updateArrowVisibility();
        }

        function navigateSlide(direction) {
            let targetIndex = currentIndex + direction;
            if (targetIndex >= 0 && targetIndex < totalSlides) {
                moveToSlide(targetIndex);
            }
        }

        track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; isDragging = true; });
        track.addEventListener('touchend', e => {
            if (!isDragging) return;
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 40 && currentIndex < totalSlides - 1) moveToSlide(currentIndex + 1);
            if (endX - startX > 40 && currentIndex > 0) moveToSlide(currentIndex - 1);
            isDragging = false;
        });

        const music = document.getElementById('bgMusic');
        const playerBtn = document.getElementById('playerBtn');
        const statusText = document.getElementById('statusText');

        function playAudio() {
            if (music.paused) {
                music.play().then(() => {
                    playerBtn.classList.add('playing');
                    statusText.innerText = "TOCANDO MÚSICA... 🎵";
                }).catch(err => console.log("Bloqueio de autoplay do navegador evitado"));
            }
        }

        document.body.addEventListener('click', () => { playAudio(); }, { once: true });
        document.body.addEventListener('touchstart', () => { playAudio(); }, { once: true });

        playerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (music.paused) {
                music.play();
                playerBtn.classList.add('playing');
                statusText.innerText = "TOCANDO MÚSICA... 🎵";
            } else {
                music.pause();
                playerBtn.classList.remove('playing');
                statusText.innerText = "MÚSICA PAUSADA";
            }
        });
    </script>
</body>
</html>
